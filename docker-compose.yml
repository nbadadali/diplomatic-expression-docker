name: diplomatic-expression

services:
  postgres:
    image: postgres:16-alpine
    container_name: diplomatic-expression-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_POSTGRESDB_DATABASE:-n8n}
      POSTGRES_USER: ${DB_POSTGRESDB_USER:-n8n}
      POSTGRES_PASSWORD: ${DB_POSTGRESDB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_POSTGRESDB_USER:-n8n} -d ${DB_POSTGRESDB_DATABASE:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: diplomatic-expression-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    volumes:
      - redis_data:/data
    healthcheck:
      test: >
        redis-cli
        ${REDIS_PASSWORD:+-a ${REDIS_PASSWORD}}
        --no-auth-warning ping
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  pgvector:
    image: pgvector/pgvector:pg16
    container_name: diplomatic-expression-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PGVECTOR_DB:-vector}
      POSTGRES_USER: ${PGVECTOR_USER:-vector}
      POSTGRES_PASSWORD: ${PGVECTOR_PASSWORD}
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGVECTOR_USER:-vector} -d ${PGVECTOR_DB:-vector}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  n8n:
    image: n8nio/n8n:${N8N_IMAGE_TAG:-latest}
    container_name: diplomatic-expression-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgvector:
        condition: service_healthy
    environment: &n8n-env
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${DB_POSTGRESDB_DATABASE:-n8n}
      DB_POSTGRESDB_USER: ${DB_POSTGRESDB_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${DB_POSTGRESDB_PASSWORD}
      EXECUTIONS_MODE: ${EXECUTIONS_MODE:-queue}
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS: ${OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS:-true}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_JWT_SECRET: ${N8N_JWT_SECRET}
      N8N_SECURE_COOKIE: ${N8N_SECURE_COOKIE:-false}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: ${N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS:-true}
      N8N_BLOCK_ENV_ACCESS: ${N8N_BLOCK_ENV_ACCESS:-true}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: ${N8N_BLOCK_ENV_ACCESS_IN_NODE:-true}
      N8N_BLOCK_ENV_VARS_FROM_EXPRESSIONS: ${N8N_BLOCK_ENV_VARS_FROM_EXPRESSIONS:-true}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:-http://localhost:5678}
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678}
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_PORT: ${N8N_PORT:-5678}
      N8N_LISTEN_ADDRESS: ${N8N_LISTEN_ADDRESS:-0.0.0.0}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Asia/Dubai}
      PGVECTOR_DB: ${PGVECTOR_DB:-vector}
      PGVECTOR_HOST: pgvector
      PGVECTOR_PORT: ${PGVECTOR_PORT:-5432}
      PGVECTOR_USER: ${PGVECTOR_USER:-vector}
      PGVECTOR_PASSWORD: ${PGVECTOR_PASSWORD}
      MCP_SERVER_URL: http://mcp-server:3000
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-}
      GOOGLE_OAUTH_TOKEN_URL: ${GOOGLE_OAUTH_TOKEN_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:-}
      PINECONE_API_KEY: ${PINECONE_API_KEY:-}
      PINECONE_INDEX: ${PINECONE_INDEX:-}
      PINECONE_NAMESPACE: ${PINECONE_NAMESPACE:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5678/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s

  n8n-worker-1:
    image: n8nio/n8n:${N8N_IMAGE_TAG:-latest}
    container_name: diplomatic-expression-n8n-worker-1
    restart: unless-stopped
    command: ["worker"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *n8n-env
      N8N_PORT: 5678

  n8n-worker-2:
    image: n8nio/n8n:${N8N_IMAGE_TAG:-latest}
    container_name: diplomatic-expression-n8n-worker-2
    restart: unless-stopped
    command: ["worker"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *n8n-env
      N8N_PORT: 5678

  mcp-server:
    build:
      context: ./mcp-server
    container_name: diplomatic-expression-mcp-server
    restart: unless-stopped
    depends_on:
      n8n:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      N8N_BASE_URL: ${N8N_BASE_URL:-http://n8n:5678}
      N8N_API_KEY: ${N8N_API_KEY:-}
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:-}

volumes:
  postgres_data:
  redis_data:
  pgvector_data:
